data:
  neon_dir: C:/Users/cantu/Downloads/NeonTreeEvaluation
  processed_dir: data/processed/segmentation
  block_size: 20.0
  block_stride: 10.0
  num_points: 4096
  min_points: 256
  tree_classes:
  - 5
  ground_classes:
  - 2
  ignore_classes:
  - 7
  normalize_height: true
  max_train_samples: 10000
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  train_sites:
  - MLBS
  - OSBS
  - SJER
  - TEAK
  - BART
  - HARV
  - JERC
  - NIWO
  - DELA
  - LENO
  - TOOL
model:
  name: pointnet2_seg
  sa_npoints:
  - 1024
  - 256
  - 64
  sa_radii:
  - 0.5
  - 1.0
  - 2.0
  sa_nsamples:
  - 32
  - 32
  - 32
  sa_mlps:
  - - 32
    - 32
    - 64
  - - 64
    - 64
    - 128
  - - 128
    - 128
    - 256
  fp_mlps:
  - - 256
    - 256
  - - 256
    - 128
  - - 128
    - 128
  seg_mlp:
  - 128
  - 64
  num_classes: 2
  dropout: 0.3
train:
  epochs: 100
  batch_size: 16
  learning_rate: 0.001
  weight_decay: 0.01
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 5
  pos_weight: 7.0
  use_dice_loss: true
  dice_weight: 0.5
  early_stopping:
    enabled: true
    patience: 20
    metric: val_iou
    mode: max
  num_workers: 0
  pin_memory: true
  gradient_clip: 5.0
clustering:
  method: watershed
  chm_resolution: 0.5
  smooth_sigma: 1.5
  min_tree_height: 3.0
  min_crown_pixels: 4
  local_max_window: 3
classification:
  model_path: results/model_B_3cls/best_model.pth
  config_path: configs/default.yaml
  num_points: 1024
hardware:
  device: cuda
  mixed_precision: true
  cudnn_benchmark: true
experiment:
  seed: 42
  name: segmentation
  log_dir: results/segmentation
  tensorboard: true
