data:
  class_names:
  - ACRU
  - AMLA
  - NYSY
  - PIPA2
  - QUAL
  - QUCO2
  - QULA2
  - QURU
  label_csv: null
  num_classes: 8
  num_points: 1024
  processed_dir: data/processed
  raw_dir: data/raw
  test_split: 0.1
  train_split: 0.8
  val_split: 0.1
experiment:
  log_dir: results
  name: default
  save_every: 10
  seed: 42
  tensorboard: true
hardware:
  cudnn_benchmark: true
  device: cuda
  mixed_precision: true
model:
  de_dims:
  - 512
  - 256
  - 128
  - 128
  dropout: 0.5
  embedding_dim: 64
  k_neighbors: 20
  name: pointmlp
  num_stages: 4
  pos_blocks: 2
  pre_blocks: 2
  reducer: 4
  stage_dims:
  - 64
  - 128
  - 256
  - 512
  stage_points:
  - 1024
  - 512
  - 256
  - 64
train:
  batch_size: 8
  early_stopping:
    enabled: true
    metric: val_acc
    mode: max
    patience: 15
  epochs: 100
  gradient_clip: 1.0
  learning_rate: 0.001
  num_workers: 0
  optimizer: adamw
  pin_memory: true
  scheduler: cosine
  warmup_epochs: 5
  weight_decay: 0.01
